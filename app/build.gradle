plugins {
    id "com.android.application"
}

def releaseKeystorePath = System.getenv("ANDROID_KEYSTORE_PATH")

android {
    namespace "com.codex.doubaomictracker"
    compileSdk 35

    defaultConfig {
        applicationId "com.codex.doubaomictracker"
        minSdk 26
        targetSdk 35
        versionCode 23
        versionName "2.2.0"
    }

    signingConfigs {
        stableRelease {
            if (releaseKeystorePath != null && !releaseKeystorePath.isEmpty()) {
                storeFile file(releaseKeystorePath)
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEY_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                storeType "PKCS12"
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.stableRelease
            minifyEnabled false
        }
    }
}